<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ways To Slot Machine</title>
    <link rel="stylesheet" href="slot-machine.css">
</head>
<body>

    <div class="machine-container">
        <header class="arrow-header">
            <h1>Ways To</h1>
        </header>

        <main class="casino-shell">
            <div class="machine-grid">
                <section class="reel-bank" id="reelBank"></section>
                
                <aside class="sidebar">
                    <div class="lever-stand">
                        <div class="lever" id="lever">
                            <span class="lever-knob"></span>
                        </div>
                    </div>
                    <button id="spinButton" class="btn-spin">PLAY</button>
                </aside>
            </div>

            <footer class="outcome-panel">
                <input type="text" id="userName" placeholder="NAME">
                <textarea id="ideationNote" placeholder="IDEAS..." style="margin-top:10px;"></textarea>
            </footer>
        </main>
    </div>

    <script src="slot-machine.js"></script>
</body>
</html>
