<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ways To Slot Machine</title>
    <link rel="stylesheet" href="slot-machine.css">
    <link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
</head>
<body>

    <div class="machine-container">
        <header class="arrow-header">
            <h1>Ways To</h1>
        </header>

        <main class="casino-shell">
            <div class="machine-grid">
                <section class="reel-bank" id="reelBank"></section>
                
                <aside class="sidebar">
                    <div class="lever-stand">
                        <div class="lever" id="lever">
                            <span class="lever-knob"></span>
                        </div>
                    </div>
                    <button id="spinButton" class="btn-spin">PLAY</button>
                </aside>
            </div>

            <footer class="outcome-panel">
                <input type="text" id="userName" placeholder="NAME">
                <input type="number" id="score" placeholder="SCORE">
                <textarea id="ideationNote" placeholder="IDEAS..."></textarea>
                <button id="saveButton" class="btn-save">SAVE RESULT</button>
            </footer>
        </main>

        <section class="saved-list" id="savedList"></section>
    </div>

    <script src="decks-data.js"></script>
    <script src="slot-machine.js"></script>
</body>
</html>
